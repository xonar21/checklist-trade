<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trading Checklist</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">Trading Checklist</div>

        <div class="rightControls">
          <form id="createForm" class="createForm">
            <input
              id="coinInput"
              class="coinInput"
              type="text"
              placeholder="Название монеты (например BTC, ETH)"
              autocomplete="off"
              required
            />
            <button class="btn primary" type="submit">Создать</button>
          </form>

          <button id="workflowStage0Btn" class="btn" type="button">Этап 0</button>
          <button id="workflowStepsBtn" class="btn" type="button">Последовательность действий</button>
          <button id="weekDaysBtn" class="btn" type="button">Дни недели</button>
          <button id="densitySignalBtn" class="btn" type="button">Плотности</button>
          <button id="themeToggleBtn" class="btn" type="button">Светлая тема</button>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar">
          <div class="sidebarTop">
            <div class="sidebarHeader">Ваши чек‑листы</div>
            <div class="sidebarHeaderActions">
              <button
                id="copyAllChecklistsBtn"
                class="btn btnCompact btnIcon"
                type="button"
                disabled
                aria-label="Скопировать все отчёты в буфер"
                title="Скопировать все отчёты"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                  <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                </svg>
              </button>
              <button id="deleteAllChecklistsBtn" class="btn btnCompact danger" type="button" disabled>
                Удалить все
              </button>
            </div>
          </div>
          <div id="checklistList" class="checklistList"></div>
        </aside>

        <main class="main">
          <div id="emptyState" class="emptyState">
            Выберите монету в списке или создайте новую чек‑таблицу.
          </div>

          <section id="detail" class="detail" hidden>
            <div class="detailHeader">
              <div class="titleBlock">
                <input id="coinEditInput" class="coinEdit" type="text" />
                <div class="meta" id="createdAt"></div>
              </div>
              <div class="detailActions">
                <button id="saveTitleBtn" class="btn" type="button">Сохранить</button>
                <button id="copyReportBtn" class="btn" type="button">Скопировать отчёт</button>
                <button id="deleteBtn" class="btn danger" type="button">Удалить</button>
              </div>
            </div>

            <div class="coinNotesSection">
              <label for="coinNotes" class="notesLabel">Описание</label>
              <textarea
                id="coinNotes"
                class="notesField"
                rows="4"
                placeholder="Заметки по ситуации по этой монете…"
              ></textarea>
            </div>

            <div id="setupVerdict" class="setupVerdict" hidden>
              <div class="setupVerdictTitle">Оценка сетапа</div>
              <div id="setupVerdictBody" class="setupVerdictBody"></div>
            </div>

            <div class="btcCorrelationRow">
              <label for="btcCorrelationInput" class="notesLabel">Корреляция с BTC (%)</label>
              <input
                id="btcCorrelationInput"
                class="btcCorrelationInput"
                type="text"
                inputmode="numeric"
                autocomplete="off"
                maxlength="3"
                placeholder="0–100"
                aria-describedby="btcCorrelationHint"
              />
              <span id="btcCorrelationHint" class="btcCorrelationHint">Только число, для отчёта и контекста этапа 0.</span>
            </div>

            <div id="sections" class="sections"></div>
          </section>
        </main>
      </div>
    </div>

    <script src="/checklist-template.js"></script>
    <script src="/setupScore.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
